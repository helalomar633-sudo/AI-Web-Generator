<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Code Generator Pro | منصة ابتكار الكود</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #d4af37;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* تغيير السنتر عشان النتيجة تظهر براحتها */
            min-height: 100vh;
            margin: 0;
            padding-top: 50px;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            margin-bottom: 30px;
        }

        .search-container {
            width: 80%;
            max-width: 700px;
        }

        textarea {
            width: 100%;
            padding: 20px;
            background: #1a1a1a;
            border: 2px solid #d4af37;
            border-radius: 15px;
            color: white;
            font-size: 1.2rem;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        button {
            margin-top: 20px;
            padding: 15px 40px;
            background: linear-gradient(45deg, #d4af37, #f9e2af);
            border: none;
            border-radius: 10px;
            color: black;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
        }

        /* صندوق النتيجة الجديد */
        #output {
            margin-top: 30px;
            width: 100%;
            max-width: 700px;
            background: #111;
            border: 1px dashed #d4af37;
            padding: 20px;
            color: #fff;
            border-radius: 10px;
            white-space: pre-wrap; /* عشان يحافظ على شكل الكود */
            font-family: monospace;
            display: none; /* مخفي في البداية */
        }
    </style>
</head>
<body>

    <h1>Code Generator Pro</h1>
    <div class="search-container">
        <!-- تأكدنا إن الـ ID هو userPrompt -->
        <textarea id="userPrompt" rows="5" placeholder="اكتب هنا مواصفات الموقع الذي تريده..."></textarea>
        <button onclick="generateCode()">توليد الأكواد فوراً ✨</button>
        
        <!-- أضفنا صندوق النتيجة -->
        <div id="output"></div>
    </div>

    <script>
        async function generateCode() {
            const promptInput = document.getElementById('userPrompt');
            const output = document.getElementById('output');

            if (!promptInput.value) {
                alert("من فضلك اكتب وصفاً للموقع أولاً!");
                return;
            }

            // إظهار الصندوق وكتابة رسالة الانتظار
            output.style.display = "block";
            output.innerText = "جاري الاتصال بالمحرك وتوليد الأكواد... ⏳";

            try {
                const response = await fetch('http://127.0.0.1:8000/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptInput.value })
                });

                const data = await response.json();
                
                if (data.code) {
                    output.innerText = data.code;
                } else if (data.error) {
                    output.innerText = "حدث خطأ من السيرفر: " + data.error;
                }
            } catch (error) {
                output.innerText = "خطأ: تأكد من تشغيل الشاشة السوداء (CMD) وكتابة python main.py";
            }
        }
    </script>
</body>
</html>
